<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="javascrpit.js"></script>
</head>
<body>

    <h1 class="main-title">⛅ Async Weather Tracker</h1>

    <div class="wrapper">

        <!-- LEFT PANEL -->
        <div class="card">
            <h3>Search City</h3>

            <form id="weather-form">
                <input type="text" id="city" placeholder="Enter city name">
                <button id="searchbtn">Search</button>
            </form>

            <h3>Search History</h3>
            <div id="history"></div>
        </div>

        <!-- RIGHT PANEL -->
    
        <div class="card">
            <h3>Weather Info</h3>
            <div id="weatherBox" class="weather-box">
                Search a city to see weather
            </div>
        </div>
    </div>


    <!-- CONSOLE PANEL -->
    <div class="console-wrapper">
        <h3>Console – Event Loop</h3>
        <div id="consoleBox" class="console-box"></div>
    </div>

</body>
</html>
